<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player - Yuan Her's Website</title>
    <link rel="stylesheet" href="musicplayer.css">
    <link rel="shortcut icon" href="assets/avatar.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.17.1/cdn/themes/light.css">
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.17.1/cdn/shoelace-autoloader.js"></script>
</head>
<body>
    <div class="container">
        <sl-avatar label="Yuan Her" image="assets/avatar.png"></sl-avatar>
        <h1>Music Player</h1>
        <div class="player">
            <div class="song1 song">
                <h3>Grenade - Acoustic</h3>
                <div class="song-info"><p>Bruno Mars</p></div>
                <audio hidden class="audio-song1">
                    <source src="assets/Grenade (Acoustic).mp3" type="audio/mpeg">
                </audio>
                <sl-progress-bar value="0" class="song1-progress-bar"></sl-progress-bar>
                <p class="time-song1"></p>
                <sl-button pill class="back5sec-song1" variant="primary">
                    <sl-icon name="rewind"></sl-icon>
                </sl-button>
                <sl-button pill class="play-song1 play-button" variant="success">
                    <sl-icon name="play"></sl-icon>
                </sl-button>    
                <sl-button pill class="forward5sec-song1" variant="primary">
                    <sl-icon name="fast-forward"></sl-icon>
                </sl-button>
            </div>
        </div>
        <div class="copyright">
            <code>Yuan Her Website&trade; 2024. All rights reserved</code>
        </div>
    </div>
    <script src="src/musicplayer.js"></script>
</body>
</html>

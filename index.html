<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuan Her's Website</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.17.1/cdn/themes/light.css">
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.17.1/cdn/shoelace-autoloader.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body ng-app="myApp" ng-controller="controllermain">
    <div class="container">
        <sl-avatar label="Yuan Her" image="assets/avatar.png"></sl-avatar>
        <h1>Yuan Her Website&trade;</h1>
        <p>Welcome to Yuan Her's Website, <i>version alpha v0.7.1</i></p>
        <sl-button class="aboutme" variant="primary" ng-click="toggleAboutInfo()" filled>
            <!-- <sl-icon name="file-person" slot="prefix"></sl-icon> -->
            <span class="material-symbols-outlined" slot="prefix">info</span>
            About Me
        </sl-button>
        <p class="aboutinfo" ng-show="isAboutInfoVisible" ng-style="aboutInfo">I'm Yuan Her. My school is SJKC Chung Hwa 2 at Butterworth, Malaysia.</p>
        
        

        <div class="copyright">
            <code>Yuan Her Website&trade; 2024. All rights reserved</code>
        </div>
    </div>
    <!-- <script src="src/index.js"></script> -->
    <script src="dist/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuan Her's Website</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="assets/avatar.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.17.1/cdn/themes/light.css">
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.17.1/cdn/shoelace-autoloader.js"></script>
</head>
<body>
    <div class="container">
        <div class="info-div">
            <sl-avatar label="Yuan Her" image="assets/avatar.png"></sl-avatar>
            <h1>Yuan Her Website&trade;</h1>
            <p>Welcome to Yuan Her's Website, <i>version v1.5.6</i></p>
            <sl-button class="aboutme" variant="primary" filled>
                <sl-icon name="info-circle" slot="prefix"></sl-icon>
                About Me
            </sl-button>
            <p class="hide aboutinfo">I'm Yuan Her. My school is SJKC Chung Hwa 2 at Butterworth, Malaysia.</p>
        </div>
        <div class="content">
            <sl-button class="playagame" variant="success" outline>
                Play a Game!
                <sl-icon name="controller"></sl-icon>
            </sl-button>
            <sl-button class="tools" variant="success" outline>
                Tools
                <sl-icon name="gear"></sl-icon>
            </sl-button>
        </div>
        <div class="copyright">
            <code>Yuan Her Website&trade; 2024. All rights reserved</code>
        </div>
    </div>
    <!-- <script src="src/index.js"></script> -->
    <script src="src/index.js"></script>
</body>
</html>
